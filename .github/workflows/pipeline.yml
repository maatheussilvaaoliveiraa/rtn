name: Pipeline RTN (diário)

# Quando rodar:
#   - schedule: DIARIAMENTE às 09:00 UTC (~06:00 BRT). Sem --mes, o pipeline
#     detecta o mês publicado mais recente e o carrega de forma idempotente —
#     então a maioria dos dias é um "no-op" barato e, quando um novo RTN sai,
#     ele é capturado em até 24h. Cron do GitHub usa UTC.
#   - workflow_dispatch: botão "Run workflow" para disparo manual, com a
#     opção de informar um mês específico (útil para reprocessar/testar).
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      mes:
        description: "Mês de referência (AAAA-MM). Vazio = mês publicado mais recente."
        required: false
        default: ""

# Evita duas execuções simultâneas escrevendo no mesmo banco.
concurrency:
  group: pipeline-rtn
  cancel-in-progress: false

jobs:
  rodar-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Os segredos ficam em Settings → Secrets and variables → Actions.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Opcional: link direto do PDF, caso o scraper do Tesouro quebre.
      RTN_PDF_URL: ${{ secrets.RTN_PDF_URL }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar pipeline
        run: |
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            python pipeline.py --mes "${{ github.event.inputs.mes }}"
          else
            python pipeline.py
          fi
