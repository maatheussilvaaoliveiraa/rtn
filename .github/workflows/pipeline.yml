name: Pipeline RTN (mensal)

# Quando rodar:
#   - schedule: todo dia 5 às 09:00 UTC (~06:00 BRT). O RTN do mês anterior
#     já costuma estar publicado nessa data. Cron do GitHub usa UTC.
#   - workflow_dispatch: botão "Run workflow" para disparo manual, com a
#     opção de informar um mês específico (útil para backfill/teste).
on:
  schedule:
    - cron: "0 9 5 * *"
  workflow_dispatch:
    inputs:
      mes:
        description: "Mês de referência (AAAA-MM). Vazio = mês atual."
        required: false
        default: ""

# Evita duas execuções simultâneas escrevendo no mesmo banco.
concurrency:
  group: pipeline-rtn
  cancel-in-progress: false

jobs:
  rodar-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Os segredos ficam em Settings → Secrets and variables → Actions.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # Opcional: link direto do PDF, caso o scraper do Tesouro quebre.
      RTN_PDF_URL: ${{ secrets.RTN_PDF_URL }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar pipeline
        run: |
          if [ -n "${{ github.event.inputs.mes }}" ]; then
            python pipeline.py --mes "${{ github.event.inputs.mes }}"
          else
            python pipeline.py
          fi
